<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>管理后台 · TT CLUB</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --gold: #B8860B;
    --gold-light: #D4A017;
    --bg: #F5EDD8;
    --card: #FAF6EC;
    --border: #E8DCB8;
    --text: #3D3527;
    --text-dim: #7A6F5A;
    --text-muted: #B8A98A;
    --red: #C0392B;
    --green: #27AE60;
  }
  html, body { background: var(--bg); color: var(--text); font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; min-height: 100vh; }

  /* ── 登录页 ── */
  #login-page {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 32px 24px;
  }
  .login-logo { font-size: 36px; margin-bottom: 8px; }
  .login-title { font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .login-sub { font-size: 13px; color: var(--text-dim); margin-bottom: 32px; }
  .login-card {
    width: 100%; max-width: 360px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px;
    box-shadow: 0 4px 20px rgba(184,134,11,0.1);
  }
  .login-field { margin-bottom: 16px; }
  .login-label { font-size: 12px; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; display: block; letter-spacing: 1px; }
  .login-input {
    width: 100%; height: 46px; padding: 0 14px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; font-size: 15px; color: var(--text);
    outline: none; transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--gold); }
  .login-btn {
    width: 100%; height: 48px;
    background: var(--gold); color: #fff; border: none;
    border-radius: 8px; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 4px;
    transition: opacity 0.2s;
  }
  .login-btn:active { opacity: 0.85; }
  .login-error { color: var(--red); font-size: 13px; text-align: center; margin-top: 10px; display: none; }

  /* ── 主页面 ── */
  #main-page { display: none; padding-bottom: 40px; }

  .top-bar {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .top-bar-title { font-size: 17px; font-weight: 700; color: var(--text); }
  .top-bar-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .logout-btn {
    padding: 6px 14px; border: 1px solid var(--border);
    border-radius: 20px; background: none;
    font-size: 12px; color: var(--text-dim); cursor: pointer;
  }

  .section { padding: 16px 16px 0; }
  .section-title {
    font-size: 11px; font-weight: 700; color: var(--gold);
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── 概况卡片 ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
  }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--gold); }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

  /* ── 教练卡片 ── */
  .coach-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 10px;
  }
  .coach-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .coach-name-row { display: flex; align-items: center; gap: 10px; }
  .coach-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(184,134,11,0.12); border: 1.5px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: var(--gold);
  }
  .coach-name { font-size: 16px; font-weight: 700; }
  .coach-course { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .coach-count {
    font-size: 11px; padding: 4px 10px; border-radius: 20px;
    background: rgba(184,134,11,0.1); color: var(--gold);
    border: 1px solid rgba(184,134,11,0.3); font-weight: 700;
  }

  /* 五维评分 */
  .score-rows { }
  .score-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .score-label { font-size: 11px; color: var(--text-dim); width: 60px; flex-shrink: 0; }
  .score-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .score-bar { height: 6px; border-radius: 3px; background: var(--gold); transition: width 0.5s; }
  .score-val { font-size: 12px; font-weight: 700; color: var(--text); width: 28px; text-align: right; flex-shrink: 0; }

  /* 留言 */
  .feedback-list { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
  .feedback-title { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
  .feedback-item {
    background: var(--bg); border-radius: 8px; padding: 10px 12px;
    margin-bottom: 6px; font-size: 13px; color: var(--text);
    line-height: 1.5; border-left: 3px solid var(--gold);
  }
  .feedback-date { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

  /* 留言列表 */
  .all-feedback-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 10px;
  }
  .all-fb-item {
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .all-fb-item:last-child { border-bottom: none; padding-bottom: 0; }
  .all-fb-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .all-fb-coach { font-size: 13px; font-weight: 700; color: var(--gold); }
  .all-fb-time { font-size: 10px; color: var(--text-muted); }
  .all-fb-text { font-size: 13px; color: var(--text); line-height: 1.5; }

  /* 加载 */
  .loading { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 14px; }
  .loading-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--gold); margin: 0 3px; animation: blink 1.2s infinite; }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

  /* 刷新按钮 */
  .refresh-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: calc(100% - 32px); margin: 0 16px 16px;
    height: 44px; border: 1px solid var(--border);
    border-radius: 8px; background: none;
    font-size: 13px; color: var(--text-dim); cursor: pointer;
  }
  .refresh-btn:active { background: var(--border); }

  /* 空状态 */
  .empty { text-align: center; padding: 20px; color: var(--text-muted); font-size: 13px; }

  /* ── Tab 导航 ── */
  .tab-bar {
    display: flex; background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 16px; gap: 0;
    position: sticky; top: 57px; z-index: 99;
  }
  .tab-btn {
    flex: 1; padding: 12px 0; font-size: 13px; font-weight: 700;
    color: var(--text-dim); background: none; border: none;
    border-bottom: 2px solid transparent; cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── 日期统计 ── */
  .date-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .date-table th {
    text-align: left; padding: 8px 10px;
    font-size: 10px; font-weight: 700; color: var(--gold);
    letter-spacing: 1px; border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .date-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .date-table tr:last-child td { border-bottom: none; }
  .date-tag {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 11px; background: rgba(184,134,11,0.1);
    color: var(--gold); border: 1px solid rgba(184,134,11,0.25);
    margin: 2px 2px 2px 0;
  }
  .date-total { font-size: 18px; font-weight: 700; color: var(--gold); }
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login-page">
  <div class="login-logo">🏅</div>
  <div class="login-title">TT CLUB 管理后台</div>
  <div class="login-sub">教练评分数据中心</div>
  <div class="login-card">
    <div class="login-field">
      <label class="login-label">账号</label>
      <input class="login-input" id="username" type="text" placeholder="请输入账号" autocomplete="off">
    </div>
    <div class="login-field">
      <label class="login-label">密码</label>
      <input class="login-input" id="password" type="password" placeholder="请输入密码">
    </div>
    <button class="login-btn" onclick="doLogin()">登录</button>
    <div class="login-error" id="login-error">账号或密码错误</div>
  </div>
</div>

<!-- 主页面 -->
<div id="main-page">
  <div class="top-bar">
    <div>
      <div class="top-bar-title">🏅 教练评分后台</div>
      <div class="top-bar-sub" id="update-time">加载中...</div>
    </div>
    <button class="logout-btn" onclick="doLogout()">退出</button>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('overview')">教练概览</button>
    <button class="tab-btn" onclick="switchTab('bydate')">按日期统计</button>
    <button class="tab-btn" onclick="switchTab('feedback')">全部留言</button>
  </div>
  <div id="content">
    <div class="loading">
      <div style="margin-bottom:12px">数据加载中</div>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
      <span class="loading-dot"></span>
    </div>
  </div>
</div>

<script>
const API = 'https://tt-club-d7g4q33g18aa3e798-1429678325.ap-shanghai.app.tcloudbase.com/rating';

const COACHES = [
  { name: "Steven",  course: "身心平衡" },
  { name: "孙欢",    course: "形体舞" },
  { name: "孙铃",    course: "核心训练/搏击训练" },
  { name: "边边",    course: "普拉提" },
  { name: "小羊",    course: "瑜伽" },
  { name: "Abby",    course: "尊巴" },
];

const SCORE_LABELS = ['课程体验','专业感','课堂氛围','强度匹配','愿意推荐'];
const SCORE_KEYS   = ['satisfaction','expertise','atmosphere','intensity','recommend'];

let _allRecords = [];
let _currentTab = 'overview';

// ── Tab 切换 ──
function switchTab(tab) {
  _currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['overview','bydate','feedback'][i] === tab);
  });
  if (_allRecords.length) renderTab(tab, _allRecords);
}

function renderTab(tab, records) {
  if (tab === 'overview')  renderOverview(records);
  if (tab === 'bydate')    renderByDate(records);
  if (tab === 'feedback')  renderFeedback(records);
}

// ── 按日期统计 ──
function renderByDate(records) {
  // 按日期分组
  const dateMap = {};
  records.forEach(r => {
    const date = r.submitTime ? r.submitTime.substring(0, 10) : '未知';
    if (!dateMap[date]) dateMap[date] = [];
    dateMap[date].push(r);
  });

  const dates = Object.keys(dateMap).sort().reverse();

  let html = `<div class="section" style="margin-bottom:16px;">
    <div class="section-title">按日期统计</div>
    <div class="all-feedback-card">
      <table class="date-table">
        <thead>
          <tr>
            <th>日期</th>
            <th>条数</th>
            <th>教练</th>
          </tr>
        </thead>
        <tbody>`;

  dates.forEach(date => {
    const rows = dateMap[date];
    // 按教练统计
    const coachCount = {};
    rows.forEach(r => {
      coachCount[r.coach] = (coachCount[r.coach] || 0) + 1;
    });
    const coachTags = Object.entries(coachCount)
      .map(([name, cnt]) => `<span class="date-tag">${name} ×${cnt}</span>`)
      .join('');

    html += `<tr>
      <td style="font-size:13px;font-weight:700;white-space:nowrap;">${date}</td>
      <td><span class="date-total">${rows.length}</span></td>
      <td>${coachTags}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;
  document.getElementById('content').innerHTML = html;
}

// ── 全部留言 ──
function renderFeedback(records) {
  const allFeedbacks = records.filter(r => r.feedback && r.feedback.trim());
  if (!allFeedbacks.length) {
    document.getElementById('content').innerHTML = '<div class="empty">暂无留言</div>';
    return;
  }
  let html = `<div class="section">
    <div class="section-title">全部留言（${allFeedbacks.length} 条）</div>
    <div class="all-feedback-card">
      ${allFeedbacks.slice().reverse().map(r => `<div class="all-fb-item">
        <div class="all-fb-header">
          <span class="all-fb-coach">${r.coach}</span>
          <span class="all-fb-time">${r.submitTime ? r.submitTime.substring(0,10) : ''}</span>
        </div>
        <div class="all-fb-text">${r.feedback}</div>
      </div>`).join('')}
    </div>
  </div>`;
  document.getElementById('content').innerHTML = html;
}

// ── 拉取数据 ──
async function loadData() {
  document.getElementById('content').innerHTML = `<div class="loading">
    <div style="margin-bottom:12px">数据加载中</div>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
    <span class="loading-dot"></span>
  </div>`;
  try {
    const res = await fetch(API + '?action=admin', { signal: AbortSignal.timeout(15000) });
    const json = await res.json();
    if (json.code === 0 && json.data && json.data.records) {
      _allRecords = json.data.records;
      const now = new Date();
      document.getElementById('update-time').textContent = '更新于 ' + now.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
      renderTab(_currentTab, _allRecords);
    } else {
      showError('数据获取失败，请稍后重试');
    }
  } catch(e) {
    showError('网络连接失败：' + e.message);
  }
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="loading" style="color:#C0392B">${msg}</div>`;
}

// ── 教练概览（原 renderDashboard）──
function renderOverview(records) {
  const now = new Date();
  const month = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');

  const monthRecords = records.filter(r => r.submitTime && r.submitTime.startsWith(month));
  const allFeedbacks = records.filter(r => r.feedback && r.feedback.trim());

  const coachMap = {};
  COACHES.forEach(c => { coachMap[c.name] = { ...c, records: [] }; });
  records.forEach(r => {
    if (coachMap[r.coach]) coachMap[r.coach].records.push(r);
    else if (r.coach) coachMap[r.coach] = { name: r.coach, course: '', records: [r] };
  });

  let totalAvg = 0, totalCount = 0;
  Object.values(coachMap).forEach(c => {
    if (c.records.length) {
      const a = SCORE_KEYS.reduce((s, k) => s + parseFloat(avg5(c.records, k)), 0) / 5;
      totalAvg += a * c.records.length;
      totalCount += c.records.length;
    }
  });
  const overallAvg = totalCount ? (totalAvg / totalCount).toFixed(1) : '--';

  let html = `<div class="section">
    <div class="section-title">本月概况</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num">${monthRecords.length}</div><div class="stat-label">本月评价总数</div></div>
      <div class="stat-card"><div class="stat-num">${overallAvg}</div><div class="stat-label">总体平均分</div></div>
      <div class="stat-card"><div class="stat-num">${records.length}</div><div class="stat-label">累计评价总数</div></div>
      <div class="stat-card"><div class="stat-num">${allFeedbacks.length}</div><div class="stat-label">有留言的评价</div></div>
    </div>
  </div>
  <div class="section"><div class="section-title">教练详情</div>`;

  COACHES.forEach(c => {
    const data = coachMap[c.name];
    if (!data || !data.records.length) {
      html += `<div class="coach-card">
        <div class="coach-card-header">
          <div class="coach-name-row">
            <div class="coach-avatar">${c.name.slice(0,2)}</div>
            <div><div class="coach-name">${c.name}</div><div class="coach-course">${c.course}</div></div>
          </div>
          <span class="coach-count">0 条</span>
        </div>
        <div class="empty">暂无评价数据</div>
      </div>`;
      return;
    }
    const rs = data.records;
    const fbs = rs.filter(r => r.feedback && r.feedback.trim());
    html += `<div class="coach-card">
      <div class="coach-card-header">
        <div class="coach-name-row">
          <div class="coach-avatar">${c.name.slice(0,2)}</div>
          <div><div class="coach-name">${c.name}</div><div class="coach-course">${c.course}</div></div>
        </div>
        <span class="coach-count">${rs.length} 条评价</span>
      </div>
      <div class="score-rows">
        ${SCORE_LABELS.map((label, i) => {
          const val = avg5(rs, SCORE_KEYS[i]);
          const pct = (val / 5 * 100).toFixed(0);
          return `<div class="score-row">
            <div class="score-label">${label}</div>
            <div class="score-bar-wrap"><div class="score-bar" style="width:${pct}%"></div></div>
            <div class="score-val">${val}</div>
          </div>`;
        }).join('')}
      </div>
      ${fbs.length ? `<div class="feedback-list">
        <div class="feedback-title">会员留言 (${fbs.length})</div>
        ${fbs.slice(-5).reverse().map(r => `<div class="feedback-item">
          ${r.feedback}
          <div class="feedback-date">${r.submitTime ? r.submitTime.substring(0,10) : ''}</div>
        </div>`).join('')}
      </div>` : ''}
    </div>`;
  });

  html += `</div><button class="refresh-btn" onclick="loadData()">↻ 刷新数据</button>`;
  document.getElementById('content').innerHTML = html;
}
function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value.trim();
  if (u === 'sakurako' && p === '0000') {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('main-page').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('main-page').style.display = 'none';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

// Enter 键登录
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

function avg5(records, key) {
  if (!records.length) return 0;
  const sum = records.reduce((s, r) => s + (Number(r[key]) || 0), 0);
  return (sum / records.length).toFixed(1);
}
</script>
</body>
</html>
