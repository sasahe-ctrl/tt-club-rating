<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IPSLE 英语备考 App · 1000词 · 200语法题 · 十篇范文</title>
<meta name="theme-color" content="#8aa07b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="IPSLE备考">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e3;
  --bg2:#fffaf0;
  --bg3:#ebe4d3;
  --border:#cfc6b4;
  --neon:#7d9270;
  --neon2:#5f7964;
  --neon3:#9dae84;
  --text:#314034;
  --text2:#667563;
  --text3:#8f987f;
  --white:#2f3c31;
  --radius:12px;
  --glow-pink:0 10px 24px rgba(125,146,112,0.16);
  --glow-cyan:0 10px 24px rgba(95,121,100,0.14);
  --glow-green:0 10px 24px rgba(157,174,132,0.18);
}
html{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  padding-top:env(safe-area-inset-top);
  padding-bottom:80px !important;
}
#wrap{max-width:480px;margin:0 auto;min-height:100vh;padding:0;position:relative}

/* ── SCANLINE OVERLAY (subtle cyberpunk effect) ── */
#wrap::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background:none;
  pointer-events:none;z-index:0;max-width:480px;margin:0 auto;
}

/* ── HEADER BAR ── */
.hbar{
  position:sticky;top:0;z-index:1000;
  background:rgba(13,17,23,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--neon);
  box-shadow:0 1px 20px rgba(255,0,255,0.15);
  display:flex;align-items:center;justify-content:center;
  padding:14px 16px 12px;
  transition:transform 0.3s;
}
.hbar.hidden{transform:translateY(-100%)}
.hbar-title{
  font-size:16px;font-weight:700;color:var(--neon);
  text-shadow:0 0 10px rgba(255,0,255,0.8);
  letter-spacing:2px;text-transform:uppercase;
}

/* ── SCROLL CONTENT ── */
.scroll-content{padding:0 14px}

/* ── HERO CARD ── */
.hero-card{
  background:var(--bg2);
  border:1px solid var(--neon);
  border-radius:18px;
  padding:22px 18px 0;
  margin:14px 0 28px;
  position:relative;
  overflow:visible;
  min-height:140px;
  box-shadow:var(--glow-pink),inset 0 1px 0 rgba(255,0,255,0.1);
}
.hero-card::after{
  content:'';
  position:absolute;top:8px;left:12px;
  width:16px;height:16px;
  background:url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAABeUlEQVR4nO2bIVLEQBBFEwoMZg2HWI1ajUBxFywKgVrLXVAr0HsEDoHBYBBgd3pFV1fP5IXq/9xUKulfv7p7JsnMPAXZXl/9no7f7jfRR3Tl4fDVjD++f+bI/Rdd1fxDZAAtgMatl7XVvEe0J5TPABlAC6A5q49ozduaG90jovG8nlA+A2QALYDmMvuApdcFveOVzwAZQAugmaPz/s3TSyjA5/45rmpgPLsuKJ8BMoAWQCMDaAE0MoAWQOO+C9h5czo8NsPj+2sz3t211y3R9/fR8cpngAygBdCEvwfYGtzsbtvrx1iN0vHKZ4AMoAXQhP8L2Hnam5ez3/Cy8fRfwEEG0AJowusAr6Z7f7cfHa98BsgAWgBNen+Ax9n7vUPvHqJ1gIMMoAXQLL5PcPSeIu0TDCIDaAE06T1CUda217h8BsgAWgBN6HzNNK3v/IDODCWRAbQAmnAPsCzdE7I1bymfATKAFkCT7gEW2xN6k615S/kMkAG0AJo/hF1/fHmgC9EAAAAASUVORK5CYII=") no-repeat center/cover;
  image-rendering:pixelated;
  opacity:0.3;
}
.hero-text-block{position:relative;z-index:2;padding-bottom:18px}
.hero-eyebrow{
  font-size:10px;font-weight:700;color:var(--neon);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;
  text-shadow:0 0 8px rgba(255,0,255,0.6);
}
.hero-title{
  font-size:22px;font-weight:800;color:var(--white);
  line-height:1.2;margin-bottom:8px;
  text-shadow:0 0 15px rgba(255,255,255,0.2);
}
.hero-sub{font-size:12px;font-weight:500;color:var(--text2)}
.hero-panda{
  position:absolute;right:-6px;bottom:-24px;z-index:3;
  filter:drop-shadow(0 0 12px rgba(255,0,255,0.5));
  transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);
}
.hero-panda:hover{transform:scale(1.06) translateY(-4px)}
.hero-panda.bounce{animation:heroBounce 0.45s cubic-bezier(.36,.07,.19,.97)}
@keyframes heroBounce{0%{transform:scale(1)}30%{transform:scale(1.12) translateY(-10px)}60%{transform:scale(0.96) translateY(2px)}100%{transform:scale(1)}}

/* ── RING STATS ── */
.rings-row{display:flex;justify-content:space-around;margin-bottom:20px;padding:0 4px}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:6px}
.ring-wrap{position:relative;width:76px;height:76px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--border);stroke-width:5}
.ring-fg{fill:none;stroke:var(--neon);stroke-width:5;stroke-linecap:round;
  transition:stroke-dashoffset 1s ease;
  filter:drop-shadow(0 0 4px rgba(255,0,255,0.8));}
.ring-num{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:17px;font-weight:800;color:var(--white);text-align:center;
  white-space:nowrap;text-shadow:0 0 8px rgba(255,0,255,0.5);
}
.ring-label{font-size:11px;color:var(--text2);font-weight:500;text-align:center}

/* ── SECTION TITLE ── */
.sec-title{
  font-size:11px;font-weight:700;color:var(--neon);
  margin-bottom:10px;padding-left:2px;
  letter-spacing:2px;text-transform:uppercase;
  text-shadow:0 0 8px rgba(255,0,255,0.5);
}

/* ── FEATURE CARDS ── */
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.feat-card-ios{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);padding:16px 14px;
  cursor:pointer;text-align:left;
  transition:transform 0.15s,border-color 0.15s,box-shadow 0.15s;
  -webkit-tap-highlight-color:transparent;
}
.feat-card-ios:active{transform:scale(0.97)}
.fc-purple:hover,.fc-purple:active{border-color:var(--neon);box-shadow:var(--glow-pink)}
.fc-green:hover,.fc-green:active{border-color:var(--neon2);box-shadow:var(--glow-cyan)}
.fc-orange:hover,.fc-orange:active{border-color:var(--neon3);box-shadow:var(--glow-green)}
.fc-blue:hover,.fc-blue:active{border-color:var(--neon2);box-shadow:var(--glow-cyan)}
.feat-icon-wrap{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;font-size:20px;
  background:rgba(255,0,255,0.08);
  border:1px solid rgba(255,0,255,0.2);
}
.fc-green .feat-icon-wrap{background:rgba(0,255,255,0.08);border-color:rgba(0,255,255,0.2)}
.fc-orange .feat-icon-wrap{background:rgba(127,255,0,0.08);border-color:rgba(127,255,0,0.2)}
.fc-blue .feat-icon-wrap{background:rgba(0,255,255,0.08);border-color:rgba(0,255,255,0.2)}
.feat-name{font-size:14px;font-weight:700;color:var(--white);margin-bottom:3px}
.feat-desc{font-size:11px;color:var(--text2);font-weight:500}

/* ── RECORDS CARD ── */
.records-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px}
.rec-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.rec-row:last-child{border-bottom:none;padding-bottom:0}
.rec-left{font-size:13px;color:var(--text2);font-weight:500}
.rec-score{font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px}
.score-good{background:rgba(127,255,0,0.15);color:var(--neon3);border:1px solid rgba(127,255,0,0.3)}
.score-ok{background:rgba(0,255,255,0.1);color:var(--neon2);border:1px solid rgba(0,255,255,0.3)}
.score-bad{background:rgba(255,0,255,0.1);color:var(--neon);border:1px solid rgba(255,0,255,0.3)}

/* ── FLASH CARD ── */
.flip-scene{
  width:100%;min-height:190px;margin-bottom:14px;
  perspective:1000px;cursor:pointer;
}
.flip-card{
  width:100%;min-height:190px;position:relative;
  transform-style:preserve-3d;
  transition:transform 0.55s cubic-bezier(0.4,0,0.2,1);
}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{
  position:absolute;top:0;left:0;width:100%;min-height:190px;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:18px;padding:28px 24px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  background:var(--bg2);border:1px solid var(--neon);
  box-shadow:var(--glow-pink);
}
.flip-back{transform:rotateY(180deg);border-color:var(--neon2);
  box-shadow:var(--glow-cyan);}
/* keep .flashcard as alias */
.flashcard{
  background:var(--bg2);border:1px solid var(--neon);
  border-radius:18px;padding:32px 24px;
  text-align:center;min-height:190px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin-bottom:14px;box-shadow:var(--glow-pink);
  transition:transform 0.15s;
}
.flashcard:active{transform:scale(0.99)}
.fw{font-size:26px;font-weight:800;color:var(--white);margin-bottom:6px;
  text-shadow:0 0 20px rgba(255,0,255,0.4);}
.fcn{font-size:17px;color:var(--neon2);font-weight:500;margin-bottom:4px;}
.feg{font-size:12px;color:var(--text2);font-style:italic;margin-top:8px;cursor:pointer;line-height:1.7}
.fcat{
  font-size:10px;padding:4px 12px;border-radius:20px;
  background:rgba(255,0,255,0.12);color:var(--neon);
  border:1px solid rgba(255,0,255,0.4);
  margin-bottom:12px;display:inline-block;
  font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  text-shadow:0 0 6px rgba(255,0,255,0.6);
}

/* ── CHIPS ── */
.chip{
  display:inline-block;font-size:11px;padding:5px 12px;
  border-radius:20px;margin:2px;cursor:pointer;
  font-weight:600;transition:all .15s;
  border:1px solid var(--border);background:transparent;color:var(--text2);
}
.chip-on{
  background:rgba(255,0,255,0.15);color:var(--neon);
  border-color:var(--neon);text-shadow:0 0 6px rgba(255,0,255,0.5);
  box-shadow:0 0 8px rgba(255,0,255,0.2);
}

/* ── PROGRESS BAR ── */
.pb{
  height:6px;background:var(--border);border-radius:4px;
  overflow:hidden;margin-bottom:14px;position:relative;
}
.pf{
  height:6px;border-radius:4px;position:relative;
  background:linear-gradient(90deg,#ff00ff,#ff69b4,#00ffff,#7fff00,#ff00ff);
  background-size:300% 100%;
  animation:flowGlow 2.5s linear infinite;
  box-shadow:0 0 8px rgba(255,0,255,0.6),0 0 16px rgba(0,255,255,0.3);
  transition:width 0.5s ease;
}
@keyframes flowGlow{
  0%{background-position:0% 50%}
  100%{background-position:300% 50%}
}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  padding:12px 20px;border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;letter-spacing:.5px;text-transform:uppercase;
  border:2px solid transparent;
  transition:all 0.2s ease;-webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(0.97)}
.btn-green{
  background:transparent;border-color:var(--neon3);color:var(--neon3);
  box-shadow:0 0 10px rgba(127,255,0,0.3);
}
.btn-green:hover{background:var(--neon3);color:var(--bg);box-shadow:0 0 20px rgba(127,255,0,0.5)}
.btn-red{
  background:transparent;border-color:#ff4444;color:#ff4444;
  box-shadow:0 0 10px rgba(255,68,68,0.3);
}
.btn-plain{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-plain:hover{border-color:var(--text2);color:var(--white)}
.btn-purple{
  background:transparent;border-color:var(--neon);color:var(--neon);
  box-shadow:0 0 10px rgba(255,0,255,0.3);
}
.btn-purple:hover{background:var(--neon);color:var(--bg);box-shadow:0 0 20px rgba(255,0,255,0.5)}
.btn-blue{
  background:transparent;border-color:var(--neon2);color:var(--neon2);
  box-shadow:0 0 10px rgba(0,255,255,0.3);
}
.btn-blue:hover{background:var(--neon2);color:var(--bg);box-shadow:0 0 20px rgba(0,255,255,0.5)}

/* ── QUIZ OPTIONS ── */
.ob{
  width:100%;text-align:left;padding:14px 16px;margin-bottom:8px;
  border-radius:10px;border:1px solid var(--border);
  background:var(--bg2);font-size:14px;font-weight:600;color:var(--text);
  cursor:pointer;font-family:inherit;display:block;
  transition:all 0.15s;-webkit-tap-highlight-color:transparent;
}
.ob:hover{border-color:var(--neon);color:var(--white);box-shadow:0 0 8px rgba(255,0,255,0.2)}
.ob:active{transform:scale(0.99)}
.oc{background:rgba(127,255,0,0.1);border-color:var(--neon3);color:var(--neon3);
  box-shadow:0 0 8px rgba(127,255,0,0.2);}
.ow{background:rgba(255,68,68,0.1);border-color:#ff4444;color:#ff4444;
  box-shadow:0 0 8px rgba(255,68,68,0.2);}

/* ── QCARD ── */
.qcard{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}

/* ── EXPLAIN BOX ── */
.eb{
  background:rgba(0,255,255,0.05);
  border:1px solid rgba(0,255,255,0.3);
  border-radius:10px;padding:12px 14px;
  font-size:12px;color:var(--neon2);
  margin-top:10px;line-height:1.8;font-weight:500;
}

/* ── RESULT RING ── */
.ring{
  width:88px;height:88px;border-radius:50%;
  background:transparent;
  border:3px solid var(--neon);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;font-size:24px;font-weight:800;color:var(--neon);
  box-shadow:var(--glow-pink);
  text-shadow:0 0 10px rgba(255,0,255,0.8);
}

/* ── WRITE TABS ── */
.wtb{
  padding:7px 13px;border-radius:20px;border:1px solid var(--border);
  font-size:11px;font-weight:700;cursor:pointer;
  background:transparent;color:var(--text2);margin:2px;
  font-family:inherit;letter-spacing:.3px;transition:all .15s;
}
.wtb.on{
  background:rgba(255,0,255,0.15);color:var(--neon);
  border-color:var(--neon);box-shadow:0 0 8px rgba(255,0,255,0.2);
}

/* ── TEMPLATE ROWS ── */
.tr{padding:10px 0;border-bottom:1px solid var(--border);font-size:12px}
.tlbl{font-size:9px;color:var(--text3);margin-bottom:3px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.ten{color:var(--neon2);font-style:italic;font-size:12px;line-height:1.7;font-weight:500}

/* ── CARDS (generic) ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px}

/* ── UPGRADE GRID ── */
.ug-grid{display:grid;grid-template-columns:82px 1fr;gap:4px 10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:start}
.ug-word{color:var(--white);font-weight:700}
.ug-reps{color:var(--text2);line-height:1.8}

/* ── SPEAK BUTTON ── */
.speak-btn{
  background:rgba(255,0,255,0.1);border:1px solid rgba(255,0,255,0.3);
  border-radius:50%;width:38px;height:38px;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--neon);transition:all .15s;flex-shrink:0;
}
.speak-btn:active{transform:scale(0.92)}
.speak-btn.playing{
  background:rgba(255,0,255,0.25);box-shadow:var(--glow-pink);
  animation:pulse .6s ease-in-out infinite alternate;
}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.12)}}

/* Panda paw prints decoration */
.paw-row{
  display:flex;justify-content:center;gap:12px;
  margin-bottom:6px;opacity:0.25;
}
.paw{font-size:14px;animation:pawFade 2s ease-in-out infinite}
.paw:nth-child(2){animation-delay:0.3s}
.paw:nth-child(3){animation-delay:0.6s}
@keyframes pawFade{0%,100%{opacity:0.2}50%{opacity:0.8}}


/* ── ESSAY ── */
.essay-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;margin-bottom:10px;
  cursor:pointer;transition:all 0.15s;
}
.essay-card:hover{border-color:var(--neon);box-shadow:0 0 10px rgba(255,0,255,0.15)}
.essay-card:active{transform:scale(0.99)}
.essay-num{font-size:10px;color:var(--text3);margin-bottom:2px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.essay-title{font-size:15px;font-weight:700;margin-bottom:2px;color:var(--white)}
.essay-cn{font-size:11px;color:var(--text2);margin-bottom:6px;font-weight:500}
.essay-body-text{font-size:14px;line-height:2;color:var(--text)}
.essay-body-text p{margin-bottom:1em;text-indent:1.5em}
.essay-body-text p:first-child{text-indent:0}
.essay-tip-box{
  background:rgba(0,255,255,0.05);border:1px solid rgba(0,255,255,0.25);
  border-radius:12px;padding:14px 16px;margin-top:16px;
  font-size:12px;color:var(--neon2);line-height:1.8;
}
.essay-tip-box strong{font-size:10px;letter-spacing:1px;color:var(--neon);display:block;margin-bottom:5px;text-transform:uppercase;font-weight:800}
.back-btn{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--neon2);cursor:pointer;margin-bottom:14px;background:none;border:none;font-family:inherit;padding:0;font-weight:600}

/* ── INSIGHT BOX ── */
.insight-box{
  background:var(--bg2);border-left:3px solid var(--neon);
  padding:14px 16px;margin-bottom:12px;border-radius:0 12px 12px 0;
  font-size:12px;line-height:1.9;color:var(--text);
  border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);
}
.insight-box h4{font-size:10px;letter-spacing:2px;color:var(--neon);text-transform:uppercase;margin-bottom:6px;font-weight:800;text-shadow:0 0 6px rgba(255,0,255,0.5)}
.insight-box.red{border-left-color:#ff4444}
.insight-box.red h4{color:#ff4444}

/* ── YEAR ROWS ── */
.yr-row{display:grid;grid-template-columns:50px 1fr 80px;gap:6px;padding:10px 0;border-bottom:1px solid var(--border);font-size:12px;align-items:start}
.yr{font-weight:800;color:var(--neon)}
.pred-hot{background:rgba(255,68,68,0.15);color:#ff4444;border:1px solid rgba(255,68,68,0.4);border-radius:20px;font-size:10px;padding:3px 10px;font-weight:700}
.pred-warm{background:rgba(255,165,0,0.15);color:#ffa500;border:1px solid rgba(255,165,0,0.4);border-radius:20px;font-size:10px;padding:3px 10px;font-weight:700}
.pred-cool{background:rgba(0,255,255,0.1);color:var(--neon2);border:1px solid rgba(0,255,255,0.3);border-radius:20px;font-size:10px;padding:3px 10px;font-weight:700}

/* ── NAV BAR ── */
.nav-wrap{
  position:fixed !important;bottom:0;left:0;right:0;
  max-width:480px;margin:0 auto;z-index:9999 !important;
}

.nav{
  display:flex;
  background:rgba(245,242,230,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(139,180,140,0.4);
  box-shadow:0 -2px 12px rgba(0,0,0,0.08);
  padding-bottom:env(safe-area-inset-bottom);
  overflow-x:auto;position:relative;z-index:9999;
}
.nav::-webkit-scrollbar{display:none}
.nb{
  flex:0 0 auto;width:70px;padding:10px 2px 8px;border:none;
  background:transparent;cursor:pointer;font-size:9px;font-weight:700;
  color:#8a9a8a;display:flex;flex-direction:column;align-items:center;

{num:'01',topic:'A Difficult Decision',cn:'一个艰难的决定',tags:['情景考验','道德两难','内心冲突'],
body:[
'The envelope sat on the floor of the school corridor, plump and unsealed. Ethan spotted it first — a thick wad of fifty-dollar notes, more money than he had ever held in his life.',
'His heart hammered. The hallway was empty. The school\'s Chinese New Year celebrations were in full swing in the hall, everyone\'s laughter tumbling down the corridor like a cheerful tide. No one had seen him.',
'"Finders keepers," a small voice whispered inside him. He thought of his mother\'s creased brow whenever she opened the household bills, the way she always smiled and said they would "manage." With this money, he could buy her a new fan to replace the noisy, broken one she refused to throw away.',
'But then he thought of whoever had dropped it — perhaps a grandparent who had saved up for months, or a student clutching their family\'s grocery money. His chest tightened.',
'Ethan stood there for what felt like an eternity. Then, slowly, he picked up the envelope and walked to the general office. His palms were damp. His steps were heavy.',
'"I found this," he said simply, sliding it across the counter to the startled clerk.',
'Walking back to the hall, Ethan felt no lighter. His mother still had her broken fan. But somewhere in his chest, something had settled — quiet and solid, like a stone finding its place at the bottom of a clear river.',
'He had made the right choice. And somehow, that was enough.'
],tip:'开篇以具体道具（信封）制造张力；内心独白展现两难；结尾用自然意象（clear river）升华主题，避免说教式总结。'},

{num:'02',topic:'A Moment of Courage',cn:'一刻勇气',tags:['成长历练','克服恐惧','助人为乐'],
body:[
'The swimming pool glittered beneath the afternoon sun, deceptively calm. Maya gripped the railing of the spectator\'s stand, her knuckles white, watching the junior swimming competition below.',
'Then she saw it. A small boy in a yellow float vest had slipped off the starting block into the deep end. He surfaced once, arms flailing, his mouth a silent "O" of panic — and then he went under.',
'Maya could not swim. Everyone knew this. She was the girl who sat on the bleachers at every pool session, writing in her notebook while her classmates splashed and laughed. Her fear of the water was a private, shameful thing she had carried since she was five.',
'But no lifeguard was in sight. The coaches had their backs turned. The boy was sinking.',
'Before her mind could catch up with her body, Maya seized the rescue hook from the wall mount and flung herself to the pool\'s edge. She stretched the pole out as far as her arms would allow, screaming for help at the top of her lungs.',
'The boy grabbed the hook. She pulled, arms burning, until two coaches came sprinting over and hauled him out. He coughed up water, crying, alive.',
'Maya sat on the wet tiles long after the commotion died down, her whole body trembling. She had not jumped in. She had not been brave in any grand sense. But when it had mattered most, she had not frozen.',
'Sometimes, she realised, courage was not about being fearless. It was about acting in spite of the fear.'
],tip:'角色有明确弱点背景（怕水），使"勇敢"更具说服力；动作描写快节奏（stretch, flung, screaming）制造紧张感；结尾提炼主题，但用人物内心反思而非叙述者旁白。'},

{num:'03',topic:'A Misunderstanding',cn:'一场误会',tags:['人际关系','沟通','友情'],
body:[
'For three weeks, Aidan had not spoken to his best friend, Reuben. Three weeks of cold lunches at opposite ends of the canteen. Three weeks of pretending not to see each other in the corridor.',
'It had started with a photograph. Someone had taken a picture of Aidan\'s science project — the one he had spent two months building — and posted it online with the caption: "Aidan\'s \'masterpiece.\'" The quote marks had been cruel. The project\'s carefully painted model of the solar system had been called a "kindergarten craft" in the comments.',
'Reuben had been the only one who had seen the project. Aidan was certain of it.',
'Then, on Sports Day, their relay team fell apart. Without Reuben and Aidan as anchor and lead, they came in last. In the changing room, Reuben dropped a crumpled piece of paper beside Aidan\'s bag and walked away without a word.',
'It was a printed screenshot — timestamped two months ago. The photo had been posted by Marcus, a classmate Aidan barely knew. And in the thread below it, Reuben\'s comment: That\'s not fair. Take this down.',
'Aidan\'s face burned. He had accused the wrong person. Reuben had never betrayed him — Reuben had defended him.',
'He found Reuben by the field, sitting alone.',
'"I\'m sorry," Aidan said. "I should have asked."',
'Reuben looked up. After a long moment, the corner of his mouth lifted. "Yeah," he said. "You should have."',
'They walked back together, side by side, the long silence between them finally broken.'
],tip:'用时间跳跃（"three weeks"）营造开场张力；误会通过实物（截图）而非对话揭开，更自然可信；修复关系的对话克制而真实，不过度煽情。'},

{num:'04',topic:'Never Give Up',cn:'永不放弃',tags:['坚毅','音乐艺术','自我突破'],
body:[
'The piano keys blurred beneath Priya\'s fingers. She had played the same twelve bars four hundred times. She knew, because she had counted.',
'The National Schools Music Festival was in six days. Her teacher, Mrs Tan, had chosen her to represent the school in the solo piano category. It was an honour that felt, increasingly, like a trap.',
'The piece — a Mozart sonata movement — had a passage in the middle that her left hand simply would not cooperate with. Every time she reached bar thirty-two, her fingers stumbled. In practice, it was embarrassing. On stage, it would be catastrophic.',
'"Give up this piece," her mother suggested gently one evening. "Choose something easier."',
'Priya stared at the sheet music. The notes seemed to stare back.',
'She did not switch pieces. Instead, she slowed bar thirty-two down to half-speed. Then quarter-speed. She practised with her eyes closed, then in the dark, until the sequence lived in her fingers rather than her mind.',
'On the day of the festival, Priya walked onto the stage and sat before the grand piano. The auditorium held its breath. She held hers.',
'Bar thirty-two came. Her left hand moved — steady, certain, clean.',
'She did not win first place. She came second. But when she stood to bow and saw Mrs Tan clapping with her eyes shining, Priya understood something that no trophy could have taught her.',
'Giving up would have been easy. Staying had made her a musician.'
],tip:'以具体细节（四百次、第32小节）代替笼统描述；成功不等于夺冠，结局更真实，情感更丰富；老师的反应作为"镜子"反射主角成长，避免自我表扬式结尾。'},

{num:'05',topic:'An Unexpected Helper',cn:'意外的帮助',tags:['感恩','陌生人善意','新加坡本地色彩'],
body:[
'The rain came without warning, as Singapore rain always does — sudden and total, as if the sky had simply given up holding it.',
'Zara was cycling home from her grandmother\'s flat with a bag of groceries balanced on the handlebars. She had been cutting through Bishan Park when the downpour hit. Within seconds, her T-shirt was soaked. The bag split. Eggs, a bag of flour, and a bunch of kai lan spilled onto the wet path.',
'She crouched to gather what she could, blinking rain from her lashes, trying not to cry. The groceries had taken her grandmother\'s entire week of pocket money.',
'"Eh, wait."',
'She looked up. An elderly man in a blue singlet was jogging over, holding a large umbrella above her. He had clearly been doing his evening walk when the rain started. Without a word, he began picking up the kai lan, shaking the mud off each bunch with practiced efficiency.',
'"The eggs are gone, lah," he said matter-of-factly, examining the cracked shells. Then he reached into his own shopping bag — he had been coming back from the market — and pressed two eggs into her hands. "For your ah ma."',
'Zara stared. "Uncle, I cannot just—"',
'"Can," he said simply, and walked away before she could argue, his umbrella bobbing into the grey curtain of rain.',
'She cycled home in the downpour, the two eggs wrapped carefully in her palm. The rain had not stopped. But something inside her felt dry, and warm, and surprisingly whole.'
],tip:'融入新加坡本地语言色彩（"Eh, wait" "lah" "ah ma"），增加真实感；帮助者离开前不接受道谢，人物形象更立体；结尾以天气与内心形成对比（外冷内暖）。'},

{num:'06',topic:'A Lesson Learnt',cn:'一堂人生课',tags:['成长','网络行为','责任感'],
body:[
'It was just a joke. That was what Lucas told himself, right up until the moment it wasn\'t.',
'He had edited a photograph of his classmate, Jamie, replacing Jamie\'s face with a cartoon character\'s and posting it in the class group chat. Everyone laughed — thirty thumbs-up emojis in sixty seconds. Lucas felt the warm glow of being funny, being popular, being seen.',
'He did not see Jamie log off and stay offline for the rest of the evening.',
'The next morning, Jamie was absent. Then the day after. Their form teacher, Mrs Nair, addressed the class quietly: Jamie had reported feeling unwell and would be away for a few days. She said nothing more, but she looked at no one in particular when she said it — and somehow, that made Lucas feel she was looking directly at him.',
'He deleted the post. He typed seventeen different apology messages to Jamie and deleted all of them. The right words kept failing him.',
'On the third day, he went to Jamie\'s block after school and rang the doorbell. When Jamie opened the door, his eyes were red-rimmed and suspicious.',
'"I\'m sorry," Lucas said, and this time, he did not dress it up. No excuses. No "it was just a joke." Just those two words, standing alone.',
'Jamie did not forgive him that afternoon. That was fair.',
'But walking home, Lucas understood something that no class lesson had ever managed to teach him: that laughter at someone\'s expense is not really laughter at all. It is a debt. And debts, eventually, always come due.'
],tip:'以网络霸凌的当代情景切入，贴近P6学生生活；"老师一眼不看又像在看所有人"是精妙的细节；道歉不一定换来原谅——这样的结局比和解大团圆更有说服力。'},

{num:'07',topic:'A Difficult Decision — 变体二',cn:'家庭版：放弃与选择',tags:['家庭情感','牺牲','亲情'],
body:[
'The acceptance letter from the National Art School had come on a Tuesday. By Wednesday, Sofia had already decided not to go.',
'Her mother had been diagnosed with a slipped disc three months ago and could no longer stand for long periods. The home-based catering business her parents ran — the one that paid for Sofia\'s art classes, her sister\'s tuition, and the family\'s groceries — had slowed to almost nothing.',
'The Art School offered a three-year programme. Three years of fieldtrips, late nights, and a campus forty minutes away by MRT. Three years of not being home.',
'Her art teacher, Mr Daud, found her in the classroom during lunch, staring at the letter.',
'"You\'re not going," he said. It wasn\'t a question.',
'"My family needs—"',
'"Your family needs you to live your life," he said. "And they need help, which is a different thing."',
'He suggested she speak to the school counsellor about financial support options. He wrote her a reference for a bursary she had not known existed. He introduced her to a senior student who lived nearby and had worked out a way to commute home every evening.',
'One month later, Sofia enrolled.',
'She thought about her mother on the first day of school — how she had pressed a small jade pendant into Sofia\'s hand and said, "Don\'t waste it." She had meant the spot. But Sofia understood she also meant something larger: the small and fragile possibility of a life you had chosen for yourself.',
'That, too, was a gift worth keeping.'
],tip:'老师角色的介入使"困难决定"有了现实解法，避免过度苦情；母亲的话"Don\'t waste it"一语双关，升华结尾。适合配图：学校告示牌 / 家庭日常 / 信件。'},

{num:'08',topic:'A Moment of Courage — 变体二',cn:'公开发言版',tags:['成长历练','公众场合','自我突破'],
body:[
'When Mr Cheong asked for volunteers to speak at the school\'s Racial Harmony Day assembly, thirty-nine hands stayed down. The fortieth belonged to Benjamin — and he had raised it before he knew what he was doing.',
'Benjamin had a stutter. Not always, and not with everyone — but in front of crowds, words sometimes caught in his throat like birds trying to fly through a closed window. He had spent eleven years being the boy at the back, the one who asked to submit written answers instead.',
'For two weeks, he practised his two-minute speech until the words came out of him like breathing. He practised in front of the mirror, in front of his younger brother, in front of his father\'s old video camera. He learned which words his mouth loved and which ones it fought against, and he rewrote the speech around them.',
'The morning of the assembly, he stood behind the heavy curtain, listening to nine hundred pairs of shoes shuffling in the hall. His mouth went dry. The first line of his speech dissolved entirely from his memory.',
'He walked out anyway.',
'He spoke slowly. He paused where the words stuck, took a breath, and continued. He finished in two minutes and twelve seconds.',
'The applause that followed was ordinary — polite and brief. But backstage, Mr Cheong shook his hand and said, "That was brave." And Benjamin\'s younger brother, who had slipped into the back of the hall, gave him a thumbs-up that felt, somehow, like a standing ovation.'
],tip:'口吃的设定使"勇气"有具体依托；"他重写了演讲绕开难发的词"展现务实智慧；掌声普通但家人反应特写，情感落点精准。'},

{num:'09',topic:'A Surprise',cn:'一个惊喜',tags:['人际关系','家庭','感动'],
body:[
'The flat smelled of curry when Kai pushed open the door, which was strange, because his mother had been working double shifts at the hospital all week and there had been no time for cooking.',
'He stopped in the hallway. The table was set — properly set, with the good plates that lived in the highest cabinet and came out only at Chinese New Year. A pot of chicken curry sat in the centre, steam rising in slow, satisfied curls. And around the table sat his mother, his grandmother, and his two aunties, all looking at him with barely contained excitement.',
'"Surprise!" his grandmother announced, rather unnecessarily.',
'Kai had forgotten his own birthday.',
'It had been a difficult year. His father\'s long stint working overseas had made everything feel slightly out of tilt, like a picture hung not-quite-straight. Kai had been trying, quietly, to be less of a burden — to ask for less, expect less, notice less.',
'He sat down. His mother placed a bowl of curry in front of him and squeezed his shoulder once, briefly, the way she did when she meant something too large for words.',
'"You okay?" she asked.',
'"Yeah," he said. And then, unexpectedly, he was.',
'The curry was the same recipe his grandmother had been making since before Kai was born. He had eaten it a hundred times. But that evening, around a table full of people who had found the time for him when he had stopped looking for it, it tasted like the best thing in the world.'
],tip:'"忘记自己生日"是精彩的反转；不正面写悲伤，而用"图没挂正"这类意象侧写家庭状态；食物作为情感载体，最后一句以感官细节收尾，余味悠长。'},

{num:'10',topic:'A New Beginning',cn:'新的开始',tags:['成长','转变','面对未来'],
body:[
'On the last day of primary school, Nadia packed her school bag one final time. She took everything out first — every pencil, every eraser stub, every folded note passed in class — and laid it all on her bed.',
'It looked like such a small life, spread across the duvet. Six years of school, and this was what it weighed.',
'She thought about the girl who had walked through that gate on the first day of Primary One: tiny, terrified, gripping her mother\'s hand so tightly that her mother had winced. That girl had cried in the bathroom during recess for three days in a row before deciding, privately and fiercely, that she was done crying.',
'A lot had happened between then and now. There had been a failed spelling test in Primary Two that she had been convinced would ruin her life. A group project in Primary Four that had nearly ended two friendships and ultimately forged them more strongly instead. The PSLE — the long, quiet terror of it — and the waiting, and the day the results came.',
'She put everything back in the bag. The pencils, the erasers, the folded notes.',
'Secondary school was a word that still felt foreign in her mouth, like a piece of furniture that hadn\'t been broken in yet. But she thought of something her father had once said: The place you\'ve never been is just a place you haven\'t got to yet.',
'Nadia zipped up her bag. Then she opened the door, and stepped out into the morning, and began.'

function getTodayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function recordActivity(type, score, total){
  const key=getTodayKey();
  const raw=localStorage.getItem('ipsle_daily')||'{}';
  const data=JSON.parse(raw);
  if(!data[key]) data[key]={date:key,vocab:0,gram:0,flash:0,scores:[],streak:0};
  if(type==='vocab') data[key].vocab++;
  if(type==='gram') data[key].gram++;
  if(type==='flash') data[key].flash+=score;
  if(score!==undefined) data[key].scores.push({type,score,total,time:Date.now()});
  // streak
  const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yk=yesterday.getFullYear()+'-'+(yesterday.getMonth()+1)+'-'+yesterday.getDate();
  const allKeys=Object.keys(data).sort();
  if(data[yk] || key===allKeys[allKeys.length-1]){
    data[key].streak=(data[yk]?data[yk].streak||0:0)+1;
  }
  localStorage.setItem('ipsle_daily',JSON.stringify(data));
  return data[key];
}

function getDailyStats(){
  const key=getTodayKey();
  const raw=localStorage.getItem('ipsle_daily')||'{}';
  const data=JSON.parse(raw);
  return data[key]||{date:key,vocab:0,gram:0,flash:0,scores:[],streak:0};
}

function getWeekStats(){
  const raw=localStorage.getItem('ipsle_daily')||'{}';
  const data=JSON.parse(raw);
  const result=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    const day=data[k]||{date:k,vocab:0,gram:0,flash:0,scores:[]};
    const dayScores=day.scores||[];
    const avg=dayScores.length?Math.round(dayScores.reduce((a,s)=>a+s.score/s.total*100,0)/dayScores.length):0;
    result.push({
      label:['日','一','二','三','四','五','六'][d.getDay()],
      active:dayScores.length>0,
      avg,
      sessions:dayScores.length
    });
  }
  return result;
}

  // Animated counters
  function animCount(id, target, suffix){
    let cur=0; const step=Math.ceil(target/30);

      const el=document.getElementById(id);

  const idx=V.map((_,i)=>i).filter(i=>f==='all'||V[i][0]===f);
  fst.order=shuf(idx);
}

function flipF(){
  if(typeof sfxFlip!=="undefined")sfxFlip();
  fst.flipped=!fst.flipped;
  const card=document.querySelector('.flip-card');
  if(card){
    card.classList.toggle('flipped',fst.flipped);
    card.classList.add('flipping');
    setTimeout(()=>card.classList.remove('flipping'),600);
    // 更新底部按钮区（不重新渲染整个卡片，保留3D翻转动画）
    const btnArea=document.getElementById('flashBtns');
    if(btnArea){
      if(fst.flipped){
        btnArea.innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
          '<button class="btn btn-coral" style="width:100%;padding:12px" onclick="markF(false)">再复习一遍</button>'+
          '<button class="btn btn-green" style="width:100%;padding:12px" onclick="markF(true)">我记住了 ✓</button></div>';
      } else {
        btnArea.innerHTML='<div style="text-align:center;margin-top:8px"><button class="btn btn-plain" style="font-size:12px;padding:8px 24px" onclick="skipF()">跳过</button></div>';
      }
    }
    if(fst.flipped){
      const rem=fst.order.filter(i=>!fst.done.has(i));
      if(rem.length>0){const w=V[rem[0]];setTimeout(()=>speak(w[1]),350);}
    }
  } else {
    rFlash();
  }
}
function skipF(){const rem=fst.order.filter(i=>!fst.done.has(i));if(rem.length)fst.done.add(rem[0]);fst.flipped=false;rFlash();}
function markF(known){
  const rem=fst.order.filter(i=>!fst.done.has(i));
  const ci=rem[0];
  if(known){
    if(!(sd.known||[]).includes(ci)){
      sd.known=sd.known||[];
      sd.known.push(ci);
    }
    fst.done.add(ci);
    sv();
    recordActivity('flash',1,1);
    if(typeof sfxMastered!=='undefined')sfxMastered();
    // 🎉 从天而降的星光彩带
    rainStarsAndRibbons();
    // 卡片中心的爆炸
    const card=document.querySelector('.flip-card');
    if(card){
      const rect=card.getBoundingClientRect();
      rewardBurstAt(rect.left+rect.width/2,rect.top+rect.height/2,'🎉');
    }
  } else {
    fst.done.add(ci);
    fst.order.push(ci);
  }
  fst.flipped=false;
  // 延迟一点再刷新，让动画完整展示
  setTimeout(()=>rFlash(),known?150:0);
}

function initQ(){
  const qs=shuf(V.map((_,i)=>i)).slice(0,30).map(ci=>{
    const w=V[ci];
    const others=shuf(V.map((_,i)=>i).filter(i=>i!==ci)).slice(0,3);
    const opts=shuf([ci,...others]);
    return{cn:w[2],cat:w[0],opts:opts.map(i=>V[i][1]),ans:opts.indexOf(ci)};
  });
  qst={type:'vocab',qs,idx:0,score:0,answered:false,chosen:-1,done:false};
}

function rQuiz(){
  renderNav();
  if(qst.done){rResult();return;}
  if(!qst.qs.length||qst.type!=='vocab')initQ();
  const q=qst.qs[qst.idx];
  app.innerHTML=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span style="font-size:12px;color:#afafaf;font-weight:700">第 ${qst.idx+1} / ${qst.qs.length} 题</span><span style="font-size:13px;font-weight:800;color:#72B84A;background:#e8f5d8;padding:3px 12px;border-radius:20px;border:2px solid #72B84A">✓ ${qst.score}</span></div>

  ${q.opts.map((o,i)=>`<button class="ob ${qst.answered?(i===q.ans?'oc':i===qst.chosen?'ow':''):''}" onclick="${qst.answered?'':'aQ('+i+')'}">${o}</button>`).join('')}

}

function aQ(c){
  const q=qst.qs[qst.idx];
  qst.answered=true;qst.chosen=c;
  if(c===q.ans){qst.score++;sfxCorrect();}
  else{sfxWrong();}
  rQuiz();
  // Auto-speak correct answer
  setTimeout(()=>speak(q.opts[q.ans]),400);
}
function nQ(){
  qst.idx++;qst.answered=false;qst.chosen=-1;
  if(qst.idx>=qst.qs.length){
    qst.done=true;if(typeof sfxComplete!=='undefined')sfxComplete();rainStarsAndRibbons();const d=new Date().toLocaleDateString('zh-CN',{month:'numeric',day:'numeric'});
    sd.scores=sd.scores||[];sd.scores.push({type:'vocab',score:qst.score,total:qst.qs.length,date:d});
    recordActivity('vocab',qst.score,qst.qs.length);
    if(sd.scores.length>10)sd.scores=sd.scores.slice(-10);sv();
  }
  rQuiz();
}

function aG(c){
  const q=qst.qs[qst.idx];

    qst.score++;sfxCorrect();
    const qcard=document.querySelector('.qcard');
    if(qcard){heartBeatEl(qcard);showScorePop(qcard,'+1');}

}

function rResult(){

// === TEXT TO SPEECH · Web Speech API ===
// 预加载语音列表（部分浏览器需要先触发一次才能获取）
let _voices=[];
function _loadVoices(){
  _voices=window.speechSynthesis?window.speechSynthesis.getVoices():[];
}
if(window.speechSynthesis){
  _loadVoices();
  window.speechSynthesis.onvoiceschanged=_loadVoices;
}

function _pickVoice(){
  // 优选高质量 Neural/Online/Premium 发音人
  // 评分系统：越高越好
  function scoreVoice(v){
    let s = 0;
    const name = v.name.toLowerCase();
    const lang = v.lang.toLowerCase();
    // 语言优先级
    if(lang === 'en-gb') s += 30;
    else if(lang === 'en-us') s += 25;
    else if(lang === 'en-au') s += 20;
    else if(lang.startsWith('en')) s += 10;
    else return -1; // 非英语直接淘汰
    // Neural / Online / Premium / Enhanced = 高质量
    if(name.includes('neural')) s += 50;
    if(name.includes('online')) s += 40;
    if(name.includes('premium')) s += 40;
    if(name.includes('enhanced')) s += 35;
    if(name.includes('natural')) s += 35;
    // 顶级发音人名
    if(name.includes('sonia')) s += 45;      // Microsoft Sonia (英国女声，超自然)
    if(name.includes('libby')) s += 42;      // Microsoft Libby
    if(name.includes('aria')) s += 40;       // Microsoft Aria (美国女声)
    if(name.includes('jenny')) s += 40;
    if(name.includes('ava')) s += 40;
    if(name.includes('ryan')) s += 38;       // Microsoft Ryan (英国男声)
    if(name.includes('emma')) s += 38;
    if(name.includes('brian')) s += 35;
    if(name.includes('samantha')) s += 30;   // Apple Samantha (美国女声)
    if(name.includes('karen')) s += 28;      // Apple Karen (澳洲女声)
    if(name.includes('daniel')) s += 28;     // Apple Daniel (英国男声)
    if(name.includes('serena')) s += 30;     // Apple Serena
    if(name.includes('moira')) s += 28;      // Apple Moira (爱尔兰)
    if(name.includes('google')) s += 25;     // Google 相对自然
    // 女声通常比男声更清晰（学习场景）
    if(name.includes('female') || name.match(/sonia|libby|aria|jenny|ava|emma|samantha|karen|serena|moira/)) s += 5;
    // Compact / eSpeak / Microsoft David 是低质量 - 扣分
    if(name.includes('compact')) s -= 30;
    if(name.includes('espeak')) s -= 50;
    if(name === 'microsoft david') s -= 20;  // 老旧 TTS 引擎
    if(name === 'microsoft mark') s -= 20;
    if(name === 'microsoft zira') s -= 15;
    return s;
  }
  const ranked = _voices
    .map(v => ({voice: v, score: scoreVoice(v)}))
    .filter(x => x.score > 0)
    .sort((a,b) => b.score - a.score);
  if(ranked.length === 0) return null;
  // 调试：可以打印选中的声音
  // console.log('Selected voice:', ranked[0].voice.name, 'score:', ranked[0].score);
  return ranked[0].voice;
}

let _utter=null;
function speak(text, btnEl){
  if(!window.speechSynthesis) return;
  // 只读英文，过滤中文及标点
  const clean=(text||'').replace(/[\u4e00-\u9fa5，。！？、；：""''（）【】·]/g,' ').replace(/\s+/g,' ').trim();
  if(!clean) return;

  // 停止当前播放
  window.speechSynthesis.cancel();
  document.querySelectorAll('.speak-btn.playing').forEach(b=>b.classList.remove('playing'));

  // 重新获取一次 voices（iOS Safari 有时需要）
  if(_voices.length===0) _loadVoices();

  _utter=new SpeechSynthesisUtterance(clean);
  const voice=_pickVoice();
  if(voice){
    _utter.voice=voice;
    _utter.lang=voice.lang;  // match voice's native language
  } else {
    _utter.lang='en-GB';
  }
  // 轻微放慢、稍高音调 = 更像老师朗读
  _utter.rate=0.85;
  _utter.pitch=1.05;
  _utter.volume=1.0;

  if(btnEl){
    btnEl.classList.add('playing');
    _utter.onend=()=>btnEl.classList.remove('playing');
    _utter.onerror=()=>btnEl.classList.remove('playing');
  }

  // iOS Safari 需要短暂延迟
  setTimeout(()=>window.speechSynthesis.speak(_utter), 50);
}

// === 每日学习反馈 ===
function getTodayKey(){
  const d=new Date();
  return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
}

function recordActivity(type, score, total){
  const key=getTodayKey();
  const raw=localStorage.getItem('ipsle_daily')||'{}';
  const data=JSON.parse(raw);
  if(!data[key]) data[key]={date:key,vocab:0,gram:0,flash:0,scores:[],streak:0};
  if(type==='vocab') data[key].vocab++;
  if(type==='gram') data[key].gram++;
  if(type==='flash') data[key].flash+=score;
  if(score!==undefined) data[key].scores.push({type,score,total,time:Date.now()});
  // streak
  const yesterday=new Date(); yesterday.setDate(yesterday.getDate()-1);
  const yk=yesterday.getFullYear()+'-'+(yesterday.getMonth()+1)+'-'+yesterday.getDate();
  const allKeys=Object.keys(data).sort();
  if(data[yk] || key===allKeys[allKeys.length-1]){
    data[key].streak=(data[yk]?data[yk].streak||0:0)+1;
  }
  localStorage.setItem('ipsle_daily',JSON.stringify(data));
  return data[key];
}

function getDailyStats(){
  const key=getTodayKey();
  const raw=localStorage.getItem('ipsle_daily')||'{}';
  const data=JSON.parse(raw);
  return data[key]||{date:key,vocab:0,gram:0,flash:0,scores:[],streak:0};
}

function getWeekStats(){
  const raw=localStorage.getItem('ipsle_daily')||'{}';
  const data=JSON.parse(raw);
  const result=[];
  for(let i=6;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
    const day=data[k]||{date:k,vocab:0,gram:0,flash:0,scores:[]};
    const dayScores=day.scores||[];
    const avg=dayScores.length?Math.round(dayScores.reduce((a,s)=>a+s.score/s.total*100,0)/dayScores.length):0;
    result.push({
      label:['日','一','二','三','四','五','六'][d.getDay()],
      active:dayScores.length>0,
      avg,
      sessions:dayScores.length
    });
  }
  return result;
}

// === 范文背诵 ===
let memoMode=0, memoParaIdx=0;

function rEssayMemo(ei){
  const e=ESSAYS[ei];
  renderNav();
  const tabs=['逐段背诵','挖空填词','跟读模式'].map((t,i)=>
    `<button class="memo-tab ${memoMode===i?'on':''}" onclick="memoMode=${i};rEssayMemo(${ei})">${t}</button>`
  ).join('');
  let content='';
  if(memoMode===0){
    content=`<div style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:10px;letter-spacing:.5px">点击每段揭示 · 逐段背诵</div>
    ${e.body.map((p,i)=>`<div class="memo-para ${i<=memoParaIdx?'revealed':'hidden-para'}" id="mp${i}"
      onclick="revealPara(${i},${ei})">${p}
      <button onclick="event.stopPropagation();speak('${p.replace(/['"]/g,' ').substring(0,100)}')"
        style="float:right;background:none;border:none;color:var(--neon);cursor:pointer;font-size:13px">🔊</button>
      </div>`).join('')}
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn btn-plain" style="flex:1;font-size:12px" onclick="memoParaIdx=0;rEssayMemo(${ei})">重置</button>
      <button class="btn" style="flex:1;font-size:12px;border-color:var(--neon);color:var(--neon)"
        onclick="memoParaIdx=Math.min(memoParaIdx+1,${e.body.length-1});rEssayMemo(${ei})">下一段 →</button>
    </div>`;
  } else if(memoMode===1){
    const KW=['because','however','therefore','moreover','furthermore','although','despite',
      'suddenly','immediately','eventually','realised','determined','terrified','overwhelmed',
      'exhausted','courage','responsibility','grateful','sincere','forgive'];
    content=`<div style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:10px">点击空格查看答案</div>
    ${e.body.map(p=>{
      let r=p;
      KW.forEach(k=>{const rx=new RegExp('\\b'+k+'\\b','gi');
        r=r.replace(rx,m=>`<span class="blank-word" onclick="this.classList.toggle('shown')">${m}</span>`);
      });
      return `<div class="memo-para revealed" style="cursor:default">${r}</div>`;
    }).join('')}
    <div style="text-align:center;margin-top:8px">
      <button class="btn btn-plain" style="font-size:11px"
        onclick="document.querySelectorAll('.blank-word').forEach(b=>b.classList.add('shown'))">显示全部</button>
      <button class="btn btn-plain" style="font-size:11px;margin-left:6px"
        onclick="document.querySelectorAll('.blank-word').forEach(b=>b.classList.remove('shown'))">隐藏全部</button>
    </div>`;
  } else {
    content=`<div style="font-size:11px;color:var(--text3);text-align:center;margin-bottom:10px">🔊 点击段落跟着朗读</div>
    ${e.body.map((p,i)=>`<div class="memo-para" id="rp${i}"
      onclick="document.querySelectorAll('.memo-para').forEach(x=>x.style.borderColor='');
        this.style.borderColor='var(--neon)';speak(ESSAYS[${ei}].body[${i}])"
      style="cursor:pointer">
      <span style="font-size:11px;color:var(--neon);font-weight:700;margin-right:6px">${i+1}.</span>${p}
    </div>`).join('')}
    <button class="btn" style="width:100%;margin-top:10px;border-color:var(--neon2);color:var(--neon2);font-size:13px"
      onclick="speakFullEssay(${ei})">▶ 朗读全文</button>`;
  }
  app.innerHTML=`
    <button class="back-btn" onclick="eIdx=${ei};memoMode=0;memoParaIdx=0;rEssay()">← 返回</button>
    <div style="font-size:16px;font-weight:700;color:var(--white);margin-bottom:4px">${e.topic}</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:12px">${e.cn}</div>
    <div class="memo-tabs">${tabs}</div>${content}`;
}

function revealPara(i,ei){
  memoParaIdx=Math.max(memoParaIdx,i);
  const el=document.getElementById('mp'+i);
  if(el){el.classList.remove('hidden-para');el.classList.add('revealed');}
}

function speakFullEssay(idx){
  const p=ESSAYS[idx].body; let i=0;
  function next(){if(i>=p.length)return;speak(p[i]);i++;setTimeout(next,p[i-1].length*55+600);}
  next();
}


const _GRAM_DETAILS = {'第三人称单数': '<b>一般现在时 · 第三人称单数</b><br><br>主语是 he/she/it 时，动词加 -s/-es。<br><br><b>加 -s：</b>play→plays, run→runs<br><b>加 -es：</b>watch→watches, go→goes<br><b>辅音+y→ies：</b>study→studies<br><b>不规则：</b>have→has, be→is<br><br>⚠️ 否定：does not + 动词原形', '过去式': '<b>一般过去时</b><br><br><b>规则：</b>动词+ed → walked, played<br><b>不规则（常考）：</b><br>go→went · come→came · take→took<br>see→saw · know→knew · buy→bought<br>eat→ate · say→said · tell→told<br>write→wrote · give→gave · run→ran<br><br><b>否定：</b>did not + 动词原形', '现在完成时': '<b>现在完成时 have/has + V3</b><br><br>①过去影响现在：She has lost her key.<br>②经历：I have visited Japan twice.<br>③持续：He has lived here for 5 years.<br><br><b>常见搭配：</b>already / yet / just / ever / never / for / since<br><b>注意：</b>since+时间点，for+时间段', '被动语态': '<b>被动语态 be + V3</b><br><br>现在：is/are + V3 → English is spoken here.<br>过去：was/were + V3 → It was written in 1990.<br>将来：will be + V3 → It will be finished.<br>完成：has been + V3 → It has been repaired.<br><br>⚠️ 情态动词被动：must be done / should be checked', '条件句': '<b>条件句（If 句型）</b><br><br><b>第一条件句（可能发生）：</b><br>If + 现在时，will + 原形<br>If it rains, I will stay home.<br><br><b>第二条件句（假设）：</b><br>If + 过去时(were)，would + 原形<br>If I were rich, I would travel.<br><br><b>第三条件句（过去虚拟）：</b><br>If + had + V3，would have + V3', '主谓一致': '<b>主谓一致规则</b><br><br><b>永远单数：</b>everyone/each/nobody/either/neither<br><b>永远复数：</b>police/people/cattle<br><b>就近原则：</b>neither...nor / either...or<br><br>Neither he nor his friends <b>are</b> ready.<br><br><b>整体单数：</b>金额/时间/距离<br>Ten dollars <b>is</b> too much.', '情态动词': '<b>情态动词用法</b><br><br><b>can</b>→能力/许可 · <b>could</b>→礼貌请求<br><b>must</b>→强制 · <b>must not</b>→禁止<br><b>should</b>→建议 · <b>ought to</b>≈should<br><b>might/may</b>→可能性<br><br><b>过去推测：</b>must have / should have / might have + V3', '冠词': '<b>冠词 a/an/the/零冠词</b><br><br><b>a/an（泛指）：</b>a book, an apple, an hour<br><b>the（特指）：</b>the sun/moon/sky, play the piano<br><b>零冠词：</b>go to school, at home, by bus, 学科名称<br><br>⚠️ university→a university (辅音音/juː/)', '介词': '<b>常考介词搭配</b><br><br><b>at：</b>good at / arrive at / aim at<br><b>in：</b>interested in / believe in / succeed in<br><b>of：</b>afraid of / proud of / consist of<br><b>for：</b>responsible for / famous for / thank for<br><b>from：</b>suffer from / prevent from<br><b>on：</b>depend on / insist on', '间接引语': '<b>间接引语时态回退</b><br><br>am/is→was · will→would · can→could<br>have→had · do/does→did · shall→should<br><br><b>陈述句：</b>said (that)...<br><b>疑问句：</b>asked if/whether...<br><b>命令句：</b>told/asked sb to do / not to do'};

function showGramDetail(idx){
  const q = (qst && qst.qs && qst.qs[idx]) ? qst.qs[idx] : null;
  const hint = q ? q[3] : '';
  let content = '';
  for(const [key,val] of Object.entries(_GRAM_DETAILS)){
    if(hint.indexOf(key.substring(0,4)) >= 0){content=val;break;}
  }
  if(!content){
    const words = hint.replace(/[·，。\s]+/g,' ').split(' ');
    for(const w of words){
      if(w.length < 2) continue;
      for(const [key,val] of Object.entries(_GRAM_DETAILS)){
        if(key.indexOf(w) >= 0){content=val;break;}
      }
      if(content) break;
    }
  }
  if(!content) content = '<b>语法提示</b><br><br>' + hint;
  const existing = document.getElementById('gram-modal-ol');
  if(existing) existing.remove();
  const ol = document.createElement('div');
  ol.className = 'gram-modal-overlay';
  ol.id = 'gram-modal-ol';
  ol.innerHTML = `<div class="gram-modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3>📖 语法详解</h3>
      <button onclick="document.getElementById('gram-modal-ol').remove()"
        style="background:none;border:1px solid var(--border);border-radius:20px;
        padding:4px 12px;color:var(--text2);font-size:12px;cursor:pointer">关闭 ×</button>
    </div>
    <div class="gram-modal-body">${content}</div>
  </div>`;
  ol.onclick = e => { if(e.target===ol) ol.remove(); };
  document.body.appendChild(ol);
}


// Long-press word lookup
let _WD={};
V.forEach(w=>{_WD[w[1].toLowerCase()]={zh:w[2]};});
let _lpT=null,_lpEl=null;
function _rmTip(){if(_lpEl){_lpEl.remove();_lpEl=null;}}
function _showTip(word,x,y){
  _rmTip();
  const clean=word.toLowerCase().replace(/[^a-z]/g,'');
  const info=_WD[clean];
  if(!info) return;
  const tip=document.createElement('div');
  tip.className='lp-tip';
  tip.innerHTML=`<div class="lp-tip-w">${word}</div><div class="lp-tip-zh">${info.zh}</div>`;
  const tipX=Math.min(x,window.innerWidth-240);
  const tipY=Math.max(y-90,10);
  tip.style.left=tipX+'px';
  tip.style.top=tipY+'px';
  document.body.appendChild(tip);
  _lpEl=tip;
  setTimeout(_rmTip,3000);
}
document.addEventListener('touchstart',e=>{
  const tgt=e.target;
  const text=(tgt.textContent||'').trim();
  if(!text||text.includes(' ')||text.length>30) return;
  _lpT=setTimeout(()=>{
    const t=e.touches[0];
    _showTip(text,t.clientX,t.clientY);
    navigator.vibrate&&navigator.vibrate(30);
  },600);
},{passive:true});
document.addEventListener('touchend',()=>clearTimeout(_lpT),{passive:true});
document.addEventListener('touchmove',()=>{clearTimeout(_lpT);_rmTip();},{passive:true});
document.addEventListener('click',_rmTip);

function rainStarsAndRibbons(){

  for(let i=0;i<18;i++){
    const s = document.createElement('div');

    s.style.animationDelay = Math.random()*0.4 + 's';
    s.style.animationDuration = (1.2 + Math.random()*0.6) + 's';
    s.style.fontSize = (16 + Math.random()*12) + 'px';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(), 2000);
  }
}

function shakeEl(el){
  if(!el) return;
  el.classList.remove('shake-x');
  void el.offsetWidth;
  el.classList.add('shake-x');
  setTimeout(()=>el.classList.remove('shake-x'), 500);
}

function heartBeatEl(el){
  if(!el) return;
  el.classList.remove('heart-beat');
  void el.offsetWidth;
  el.classList.add('heart-beat');
  setTimeout(()=>el.classList.remove('heart-beat'), 900);
}


function resetK(){
  // 自定义确认对话框 - 避免 confirm 被浏览器拦截
  const exist=document.getElementById('reset-modal');
  if(exist)exist.remove();
  const ol=document.createElement('div');
  ol.id='reset-modal';
  ol.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease';
  ol.innerHTML=`<div style="background:var(--bg2);border:1.5px solid var(--neon);border-radius:16px;padding:20px;max-width:340px;width:100%;box-shadow:0 0 30px rgba(255,0,255,0.3)">
    <div style="font-size:15px;font-weight:700;color:var(--white);margin-bottom:10px">确定要重置吗？</div>
    <div style="font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:18px">
      已掌握的单词会全部清零，需要重新学习。<br>
      <span style="color:var(--text3)">测验成绩和学习记录不受影响。</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button id="reset-cancel" class="btn btn-plain" style="width:100%;font-size:13px">取消</button>
      <button id="reset-confirm" class="btn" style="width:100%;font-size:13px;border:1.5px solid var(--neon);color:var(--neon);background:rgba(255,0,255,0.08)">确认重置</button>
    </div>
  </div>`;
  document.body.appendChild(ol);
  document.getElementById('reset-cancel').onclick=()=>ol.remove();
  ol.onclick=(e)=>{if(e.target===ol)ol.remove();};
  document.getElementById('reset-confirm').onclick=()=>{
    // 清空掌握记录
    sd.known=[];
    // 重置 flash 状态
    fst.done=new Set();
    fst.order=[];
    fst.flipped=false;
    // 保存
    try{localStorage.setItem('ipsle_study',JSON.stringify(sd));}catch(e){}
    if(typeof sfxFlip!=='undefined')sfxFlip();
    ol.remove();
    // 提示
    const tip=document.createElement('div');
    tip.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(13,17,23,0.95);border:1.5px solid var(--neon3);border-radius:12px;padding:14px 22px;color:var(--neon3);font-size:14px;font-weight:700;z-index:10001;box-shadow:0 0 20px rgba(127,255,0,0.4)';
    tip.textContent='✓ 已重置！已掌握：0';
    document.body.appendChild(tip);
    setTimeout(()=>tip.remove(),1500);
    // 刷新首页
    rHome();
  };
}

function go(scr){
  S=scr;
  if(scr==='home')rHome();
  else if(scr==='flash')rFlash();
  else if(scr==='quiz'){initQ();rQuiz();}
  else if(scr==='gram'){initG();rGram();}
  else if(scr==='write')rWrite();
  else if(scr==='essay'){eIdx=-1;rEssay();}
  else if(scr==='feedback')rFeedback();
}


ld();rHome();
</script>
