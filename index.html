<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>教练评分 · TT CLUB & 广粤会</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap');

  :root {
    --green: #39FF14;
    --green-dim: rgba(57,255,20,0.12);
    --green-glow: rgba(57,255,20,0.35);
    --bg: #080808;
    --card: #111111;
    --border: #222222;
    --text: #FFFFFF;
    --text-dim: #888888;
    --text-muted: #383838;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .page { display: none; min-height: 100vh; flex-direction: column; }
  .page.active { display: flex; }
  .page-enter { animation: pageIn 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both; }

  @keyframes pageIn {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── 首页 ── */
  .home-header {
    padding: 52px 24px 28px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  .home-header::before {
    content: '';
    position: absolute;
    top: -80px; left: -60px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(57,255,20,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .home-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 4px; color: var(--green);
    margin-bottom: 10px; text-transform: uppercase;
  }
  .home-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 62px; font-weight: 900;
    line-height: 0.88; letter-spacing: -1px;
    color: #fff; text-transform: uppercase;
  }
  .home-title span {
    color: var(--green); display: block;
    text-shadow: 0 0 40px rgba(57,255,20,0.4);
  }
  .home-subtitle {
    margin-top: 16px; font-size: 13px;
    color: var(--text-dim); line-height: 1.6;
  }

  .coach-list { flex: 1; padding-bottom: 40px; }

  .coach-item {
    display: flex; align-items: center; gap: 16px;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; position: relative;
    overflow: hidden; min-height: 76px;
    transition: background 0.18s;
    -webkit-user-select: none; user-select: none;
  }
  .coach-item::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--green);
    transform: scaleY(0); transform-origin: center;
    transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .coach-item.touched::before { transform: scaleY(1); }
  .coach-item.touched { background: var(--green-dim); }

  .ripple {
    position: absolute; border-radius: 50%;
    background: rgba(57,255,20,0.15);
    transform: scale(0);
    animation: ripple 0.5s ease-out forwards;
    pointer-events: none;
  }
  @keyframes ripple { to { transform: scale(4); opacity: 0; } }

  .coach-avatar {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--green-dim); border: 1.5px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 15px; color: var(--green);
    flex-shrink: 0; transition: box-shadow 0.2s;
  }
  .coach-item.touched .coach-avatar { box-shadow: 0 0 16px rgba(57,255,20,0.4); }

  .coach-info { flex: 1; min-width: 0; }
  .coach-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  .coach-course { font-size: 12px; color: var(--text-dim); }
  .coach-course em { font-style: normal; color: var(--text-muted); margin-left: 4px; }

  .coach-arrow {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 14px; flex-shrink: 0;
    transition: border-color 0.2s, color 0.2s, transform 0.2s;
  }
  .coach-item.touched .coach-arrow { border-color: var(--green); color: var(--green); transform: translateX(4px); }

  /* ── 评分页 ── */
  .rate-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-bottom: 1px solid var(--border); min-height: 56px;
  }
  .back-btn {
    width: 40px; height: 40px; border-radius: 50%;
    border: 1px solid var(--border); background: none;
    color: var(--text-dim); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, color 0.2s;
  }
  .back-btn:active { border-color: var(--green); color: var(--green); }

  .progress-label {
    font-size: 11px; color: var(--green); font-weight: 700;
    letter-spacing: 2px; font-family: 'Barlow Condensed', sans-serif;
  }
  .coach-banner {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 24px; background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .coach-banner-avatar {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--green-dim); border: 1.5px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 14px; color: var(--green);
    flex-shrink: 0; box-shadow: 0 0 12px rgba(57,255,20,0.2);
  }
  .coach-banner-name { font-size: 17px; font-weight: 700; color: #fff; }
  .coach-banner-course {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 2px; color: var(--green);
    text-transform: uppercase; margin-top: 2px;
  }

  .rate-body {
    flex: 1; overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 130px;
  }
  .rate-card {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    gap: 10px; min-height: 72px;
  }
  .rate-card-left { flex: 1; min-width: 0; }
  .rate-card-title { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  .rate-card-sub { font-size: 11px; color: var(--text-dim); }

  .stars { display: flex; gap: 4px; flex-shrink: 0; }
  .star {
    width: 36px; height: 44px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .star svg {
    width: 26px; height: 26px;
    transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    overflow: visible;
  }
  .star svg path { fill: var(--border); transition: fill 0.15s; }
  .star.active svg { transform: scale(1.15); }
  .star.active svg path {
    fill: var(--green);
    filter: drop-shadow(0 0 5px rgba(57,255,20,0.6));
  }
  .star.pop svg { animation: starPop 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes starPop {
    0%  { transform: scale(1); }
    40% { transform: scale(1.55); }
    100%{ transform: scale(1.15); }
  }

  .feedback-section { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .feedback-label { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 3px; }
  .feedback-label span {
    color: var(--green); font-size: 11px; font-weight: 400;
    margin-left: 6px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px;
  }
  .feedback-sub { font-size: 11px; color: var(--text-dim); margin-bottom: 12px; line-height: 1.5; }
  .feedback-input {
    width: 100%; background: var(--card);
    border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 14px; color: #fff; font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    resize: none; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-height: 80px; line-height: 1.5;
  }
  .feedback-input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(57,255,20,0.08); }
  .feedback-input::placeholder { color: var(--text-muted); }
  .feedback-count { text-align: right; font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  .submit-wrap {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 14px 24px 36px;
    background: linear-gradient(to top, #080808 70%, transparent);
  }
  .submit-btn {
    width: 100%; height: 52px;
    background: var(--green); color: #000; border: none;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 700; letter-spacing: 3px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    gap: 8px; text-transform: uppercase;
    transition: opacity 0.2s, transform 0.15s;
    position: relative; overflow: hidden;
  }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .submit-btn.pulsing::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.3);
    animation: btnPulse 0.4s ease-out forwards;
  }
  @keyframes btnPulse { from { opacity: 1; } to { opacity: 0; } }

  .submit-error { text-align: center; font-size: 12px; color: #ff4444; margin-top: 8px; display: none; }
  .submit-hint { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 6px; }

  /* ── 已评过页 ── */
  #page-rated {
    align-items: center; justify-content: center;
    padding: 60px 32px; text-align: center;
  }
  .rated-icon { font-size: 48px; margin-bottom: 24px; opacity: 0.6; }
  .rated-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 38px; font-weight: 900; color: #fff;
    text-transform: uppercase; margin-bottom: 12px;
  }
  .rated-sub { font-size: 14px; color: var(--text-dim); line-height: 1.8; margin-bottom: 36px; }
  .rated-btn {
    padding: 15px 36px; border: 1px solid var(--green); border-radius: 8px;
    background: none; color: var(--green);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer; transition: background 0.2s; text-transform: uppercase;
  }
  .rated-btn:active { background: var(--green-dim); }

  /* ── 成功页 ── */
  #page-success {
    align-items: center; justify-content: center;
    padding: 60px 32px; text-align: center;
    position: relative; overflow: hidden;
  }

  .soundwave-wrap {
    position: relative; width: 180px; height: 180px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
  }
  .wave-ring {
    position: absolute; border-radius: 50%;
    border: 1.5px solid var(--green); opacity: 0;
  }
  .wave-ring-1 { width: 100px; height: 100px; }
  .wave-ring-2 { width: 134px; height: 134px; }
  .wave-ring-3 { width: 168px; height: 168px; }

  #page-success.active .wave-ring-1 { animation: waveExpand 2s ease-out 0.1s infinite; }
  #page-success.active .wave-ring-2 { animation: waveExpand 2s ease-out 0.45s infinite; }
  #page-success.active .wave-ring-3 { animation: waveExpand 2s ease-out 0.8s infinite; }

  @keyframes waveExpand {
    0%   { opacity: 0.65; transform: scale(0.85); }
    100% { opacity: 0;    transform: scale(1.25); }
  }

  .success-circle {
    width: 90px; height: 90px; border-radius: 50%;
    border: 2px solid var(--green);
    background: rgba(57,255,20,0.06);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 30px rgba(57,255,20,0.25), inset 0 0 20px rgba(57,255,20,0.05);
    position: relative; z-index: 1;
  }
  .success-check { width: 36px; height: 36px; }
  .check-path {
    stroke-dasharray: 30; stroke-dashoffset: 30;
  }
  #page-success.active .check-path {
    animation: drawCheck 0.5s ease-out 0.2s forwards;
  }
  @keyframes drawCheck { to { stroke-dashoffset: 0; } }

  .success-badge {
    display: inline-block; padding: 4px 16px;
    border: 1px solid var(--green); border-radius: 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700; letter-spacing: 4px;
    color: var(--green); margin: 20px 0 16px;
  }
  .success-title { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 12px; }
  .success-count { font-size: 14px; color: var(--text-dim); line-height: 1.8; margin-bottom: 40px; }
  .success-count strong { color: var(--green); font-size: 20px; font-weight: 700; }

  .success-btn {
    padding: 15px 36px; border: 1px solid var(--border); border-radius: 8px;
    background: none; color: var(--text-dim); font-size: 15px;
    cursor: pointer; transition: border-color 0.2s, color 0.2s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .success-btn:active { border-color: var(--green); color: var(--green); }
</style>
</head>

<script>
// ══ 声音系统 ══
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, duration, volume, delay) {
  delay = delay || 0; volume = volume || 0.25;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(0, ctx.currentTime + delay);
    gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + delay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration + 0.05);
  } catch(e) {}
}
function soundTap()       { playTone(180,'sine',0.08,0.2); }
function soundStar(i)     { const f=[261,294,329,392,523]; playTone(f[i]||523,'triangle',0.18,0.28); }
function soundSubmit()    { playTone(300,'sine',0.08,0.18); playTone(400,'sine',0.08,0.18,0.08); playTone(520,'sine',0.12,0.2,0.16); }
function soundSuccess()   { playTone(440,'triangle',0.15,0.3,0); playTone(554,'triangle',0.15,0.3,0.15); playTone(659,'triangle',0.25,0.35,0.3); playTone(80,'sine',0.12,0.35,0); }
function soundDuplicate() { playTone(220,'sawtooth',0.15,0.15); playTone(180,'sawtooth',0.2,0.15,0.15); }

// ══ 数据 ══
const COACHES = [
  { name:"Steven", course:"身心平衡", courseEn:"Body Balance" },
  { name:"孙欢",   course:"形体舞",   courseEn:"Body Dance" },
  { name:"孙铃",   course:"核心训练", courseEn:"Body Combat" },
  { name:"边边",   course:"普拉提",   courseEn:"Pilates" },
  { name:"小羊",   course:"瑜伽",     courseEn:"Yoga" },
  { name:"Abby",   course:"尊巴",     courseEn:"Zumba" },
];
const GAS_URL = 'https://tt-club-d7g4q33g18aa3e798-1429678325.ap-shanghai.app.tcloudbase.com/rating';
let selectedCoach = null;
const ratings = { q1:0, q2:0, q3:0, q4:0, q5:0 };

function getUUID() {
  let id = localStorage.getItem('rating_uuid');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('rating_uuid', id); }
  return id;
}

// ══ 页面切换 ══
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active','page-enter'));
  const t = document.getElementById(id);
  t.classList.add('active');
  requestAnimationFrame(() => t.classList.add('page-enter'));
  window.scrollTo(0,0);
}
function goBack() { soundTap(); showPage('page-home'); }

// ══ 首页列表 ══
function initCoachList() {
  const list = document.getElementById('coachList');
  COACHES.forEach(coach => {
    const initials = /^[A-Za-z]/.test(coach.name)
      ? coach.name.slice(0,2).toUpperCase() : coach.name.slice(0,2);
    const item = document.createElement('div');
    item.className = 'coach-item';
    item.innerHTML = `
      <div class="coach-avatar">${initials}</div>
      <div class="coach-info">
        <div class="coach-name">${coach.name}</div>
        <div class="coach-course">${coach.course}<em>/ ${coach.courseEn}</em></div>
      </div>
      <div class="coach-arrow">→</div>`;

    item.addEventListener('touchstart', (e) => {
      item.classList.add('touched');
      const rect = item.getBoundingClientRect();
      const touch = e.touches[0];
      const r = document.createElement('div');
      r.className = 'ripple';
      const s = 60;
      r.style.cssText = `width:${s}px;height:${s}px;left:${touch.clientX-rect.left-s/2}px;top:${touch.clientY-rect.top-s/2}px`;
      item.appendChild(r);
      setTimeout(() => r.remove(), 500);
    }, {passive:true});
    item.addEventListener('touchend', () => setTimeout(() => item.classList.remove('touched'), 200), {passive:true});
    item.onclick = () => { soundTap(); handleCoachClick(coach); };
    list.appendChild(item);
  });
}

// ══ 点击教练 ══
async function handleCoachClick(coach) {
  selectedCoach = coach;
  const initials = /^[A-Za-z]/.test(coach.name)
    ? coach.name.slice(0,2).toUpperCase() : coach.name.slice(0,2);
  document.getElementById('bannerAvatar').textContent = initials;
  document.getElementById('bannerName').textContent = coach.name;
  document.getElementById('bannerCourse').textContent = `${coach.course} / ${coach.courseEn.toUpperCase()}`;
  Object.keys(ratings).forEach(k => ratings[k] = 0);
  ['q1','q2','q3','q4','q5'].forEach(renderStars);
  document.getElementById('feedbackText').value = '';
  document.getElementById('feedbackCount').textContent = '0';
  document.getElementById('submitError').style.display = 'none';
  const btn = document.getElementById('submitBtn');
  btn.disabled = false; btn.innerHTML = '&#9993;&nbsp; 提交反馈';

  let canRate = true;
  try {
    const url = `${GAS_URL}?uuid=${encodeURIComponent(getUUID())}&coach=${encodeURIComponent(coach.name)}`;
    const res = await fetch(url, {signal: AbortSignal.timeout(8000)});
    if (res.ok) { const j = await res.json(); if (j.code === 2001) canRate = false; }
  } catch(_) { canRate = true; }

  if (!canRate) {
    soundDuplicate();
    document.getElementById('ratedText').innerHTML =
      `你今天已经为 <strong style="color:#39FF14">${coach.name}</strong> 评过分了。<br>每位教练每天只能评一次，明天再来吧！`;
    showPage('page-rated');
  } else {
    showPage('page-rate');
  }
}

// ══ 星星 ══
function renderStars(q) {
  const c = document.getElementById(`stars-${q}`);
  c.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const s = document.createElement('div');
    s.className = 'star' + (i <= ratings[q] ? ' active' : '');
    s.innerHTML = `<svg viewBox="0 0 24 24" overflow="visible"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
    const idx = i;
    s.addEventListener('touchstart', ()=>{}, {passive:true});
    s.onclick = () => {
      ratings[q] = idx; soundStar(idx-1); renderStars(q);
      const ns = document.getElementById(`stars-${q}`).children[idx-1];
      if (ns) { ns.classList.add('pop'); setTimeout(()=>ns.classList.remove('pop'),300); }
    };
    c.appendChild(s);
  }
}

// ══ 提交 ══
async function handleSubmit() {
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('submitError');
  soundSubmit();
  btn.classList.add('pulsing');
  setTimeout(()=>btn.classList.remove('pulsing'),400);
  btn.disabled = true; btn.innerHTML = '提交中...';
  errEl.style.display = 'none';

  const payload = {
    uuid: getUUID(), coach: selectedCoach.name, course: selectedCoach.course,
    scores: { satisfaction:ratings.q1, professionalism:ratings.q2, atmosphere:ratings.q3, intensity:ratings.q4, recommendation:ratings.q5 },
    feedback: document.getElementById('feedbackText').value.trim(),
  };

  try {
    const res = await fetch(GAS_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload), signal: AbortSignal.timeout(12000),
    });
    if (!res.ok) throw new Error('http');
    let json; try { json = await res.json(); } catch { throw new Error('parse'); }

    if (json.code === 0) {
      const count = json.data && json.data.raterCount ? json.data.raterCount : '';
      document.getElementById('successData').innerHTML = count
        ? `感谢你的评价！你是本月第 <strong>${count}</strong> 位评价 ${selectedCoach.name} 的会员。`
        : `感谢你的评价，每一条反馈都会帮助我们的教练变得更好。`;
      showPage('page-success');
      setTimeout(()=>soundSuccess(), 200);
    } else if (json.code === 2001) {
      soundDuplicate();
      document.getElementById('ratedText').innerHTML =
        `你今天已经为 <strong style="color:#39FF14">${selectedCoach.name}</strong> 评过分了。<br>每位教练每天只能评一次，明天再来吧！`;
      showPage('page-rated');
    } else { throw new Error('server'); }

  } catch(_) {
    btn.disabled = false; btn.innerHTML = '&#9993;&nbsp; 提交反馈';
    errEl.textContent = '网络似乎不太稳定，请稍后再试';
    errEl.style.display = 'block';
  }
}

// ══ 初始化 ══
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('feedbackText').addEventListener('input', function() {
    document.getElementById('feedbackCount').textContent = this.value.length;
  });
  initCoachList();
  ['q1','q2','q3','q4','q5'].forEach(renderStars);
});
</script>
